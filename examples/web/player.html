<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GNC/GNV WebGPU Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        h1 { color: #fff; margin-bottom: 4px; font-size: 1.4em; }
        .subtitle { color: #888; margin-bottom: 16px; font-size: 0.9em; }

        /* --- Top section: two columns above the video --- */
        .top-section {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .top-left {
            flex: 1;
            min-width: 0;
        }
        .top-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        @media (max-width: 720px) {
            .top-section { flex-direction: column; }
        }

        .drop-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 12px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.08);
        }
        .drop-zone input { display: none; }

        .file-selector {
            margin-bottom: 12px;
        }
        .file-selector label {
            display: block;
            font-size: 0.82em;
            color: #888;
            margin-bottom: 4px;
        }
        .file-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .file-row select {
            flex: 1;
            background: #222;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 0.88em;
            font-family: inherit;
            cursor: pointer;
        }
        .file-row select:hover { border-color: #6c63ff; }
        .file-row select option { background: #222; }
        .file-row select optgroup { color: #6c63ff; font-weight: bold; }
        .file-row button {
            padding: 7px 14px;
            font-size: 0.88em;
        }
        .file-desc {
            font-size: 0.75em;
            color: #666;
            margin-top: 3px;
            min-height: 1.2em;
        }

        .canvas-wrap {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            line-height: 0;
            max-width: 1100px;
            width: 100%;
        }
        canvas {
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 16px;
            font-size: 0.9em;
            cursor: pointer;
            white-space: nowrap;
        }
        button:hover { background: #5a52d5; }
        button:disabled { background: #444; cursor: default; }
        input[type="range"] {
            flex: 1;
            accent-color: #6c63ff;
        }
        .frame-label {
            font-variant-numeric: tabular-nums;
            font-size: 0.82em;
            min-width: 72px;
            text-align: right;
        }

        .stats {
            font-size: 0.78em;
            color: #888;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stats span { white-space: nowrap; }

        .timing-bar {
            display: flex;
            gap: 12px;
            font-size: 0.78em;
            color: #888;
            font-variant-numeric: tabular-nums;
        }
        .timing-bar .t-seek { color: #d8c87c; }
        .timing-bar .t-decode { color: #7cd88b; }
        .timing-bar .t-total { color: #7cb3d8; }
        .timing-bar .t-fps { color: #c87cd8; }

        .diag-panel {
            margin-top: 4px;
        }
        .diag-panel summary {
            cursor: pointer;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        .diag-content {
            background: #111;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.72em;
            line-height: 1.45;
            color: #bbb;
            white-space: pre;
        }
        .diag-content .diag-warn { color: #d87c7c; }
        .diag-content .diag-type-I { color: #7cd88b; }
        .diag-content .diag-type-P { color: #7cb3d8; }
        .diag-content .diag-type-B { color: #d8c87c; }

        #status {
            margin-bottom: 8px;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85em;
            text-align: center;
        }
        .status-info { background: #1e3a5f; color: #7cb3d8; }
        .status-error { background: #5f1e1e; color: #d87c7c; }
        .status-ok { background: #1e5f2e; color: #7cd88b; }

        .right-label {
            font-size: 0.78em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .log-panel { margin-top: 4px; }
        .log-panel summary {
            cursor: pointer;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        .log-panel summary .log-count {
            color: #6c63ff;
            font-variant-numeric: tabular-nums;
        }
        .log-toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
            align-items: center;
        }
        .log-toolbar button {
            background: #2a2a4a;
            font-size: 0.75em;
            padding: 4px 10px;
        }
        .log-toolbar button:hover { background: #3a3a5a; }
        .log-summary {
            font-size: 0.72em;
            color: #888;
            font-variant-numeric: tabular-nums;
            margin-left: auto;
        }
        .log-wrap {
            max-height: 300px;
            overflow-y: auto;
            border-radius: 6px;
            background: #111;
        }
        .log-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.7em;
            font-variant-numeric: tabular-nums;
        }
        .log-wrap th {
            position: sticky;
            top: 0;
            background: #1a1a2e;
            color: #888;
            text-align: right;
            padding: 4px 8px;
            font-weight: 500;
            border-bottom: 1px solid #333;
        }
        .log-wrap th:first-child { text-align: left; }
        .log-wrap td {
            padding: 2px 8px;
            text-align: right;
            color: #bbb;
            border-bottom: 1px solid #1a1a2e;
        }
        .log-wrap td:first-child { text-align: left; color: #888; }
        .log-wrap tr:hover td { background: #1a1a3e; }
        .log-wrap .col-seek { color: #d8c87c; }
        .log-wrap .col-decode { color: #7cd88b; }
        .log-wrap .col-total { color: #7cb3d8; }
        .log-wrap .col-fps { color: #c87cd8; }
        .log-wrap .row-gop td { background: #1a1a28; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <h1>GNC/GNV WebGPU Player</h1>
    <p class="subtitle">Drag & drop, select, or choose a demo file below</p>

    <div class="top-section">
        <!-- Left column: file input + file selector + status -->
        <div class="top-left">
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".gnc,.gnv,.gnv2">
                <p>Click or drop <code>.gnc</code> / <code>.gnv</code> / <code>.gnv2</code> file here</p>
            </div>

            <div class="file-selector">
                <label>Demo files</label>
                <div class="file-row">
                    <select id="demoSelect">
                        <option value="">-- Select a demo --</option>
                    </select>
                    <button id="loadDemoBtn">Load</button>
                    <a id="demoDlLink" style="display:none" title="Download"><button type="button" style="background:#2a2a4a;padding:7px 10px;font-size:0.82em;">&#x2B07;</button></a>
                    <a id="demoDiagLink" style="display:none" target="_blank" title="Open .diag"><button type="button" style="background:#2a2a4a;padding:7px 10px;font-size:0.72em;">diag</button></a>
                </div>
                <div class="file-desc" id="demoDesc"></div>
            </div>

            <div id="status" class="status-info">Ready</div>
        </div>

        <!-- Right column: controls + stats + timing + diagnostics -->
        <div class="top-right" id="rightPanel" style="display:none">
            <div class="controls" id="controlsBar">
                <button id="playBtn" disabled>Play</button>
                <button id="stopBtn" disabled title="Stop and reset to frame 0">Stop</button>
                <button id="prevBtn" disabled title="Previous frame">&lsaquo;</button>
                <button id="nextBtn" disabled title="Next frame">&rsaquo;</button>
                <input type="range" id="seekBar" min="0" max="0" value="0" step="1">
                <span class="frame-label" id="frameLabel">0 / 0</span>
            </div>

            <div class="stats" id="statsBar">
                <span id="statRes"></span>
                <span id="statFps"></span>
                <span id="statSize"></span>
                <span id="statPath"></span>
            </div>

            <div class="timing-bar" id="timingBar">
                <span class="t-seek" id="timSeek">Seek: --</span>
                <span class="t-decode" id="timDecode">Decode: --</span>
                <span class="t-total" id="timTotal">Total: --</span>
                <span class="t-fps" id="timPlayFps"></span>
            </div>

            <details class="diag-panel" id="diagPanel" style="display:none">
                <summary>Frame diagnostics <a id="diagFullLink" href="#" target="_blank" style="color:#6c63ff;font-size:0.85em;margin-left:8px;text-decoration:none;display:none">open full .diag</a></summary>
                <div class="diag-content" id="diagContent">No diagnostics available</div>
            </details>

            <details class="log-panel" id="logPanel">
                <summary>Timing log <span class="log-count" id="logCount">(0 frames)</span></summary>
                <div class="log-toolbar">
                    <button id="logClearBtn">Clear</button>
                    <button id="logCopyBtn">Copy CSV</button>
                    <span class="log-summary" id="logSummary"></span>
                </div>
                <div class="log-wrap" id="logWrap">
                    <table>
                        <thead><tr>
                            <th>Frame</th>
                            <th>Seek ms</th>
                            <th>Decode ms</th>
                            <th>Total ms</th>
                            <th>FPS</th>
                        </tr></thead>
                        <tbody id="logBody"></tbody>
                    </table>
                </div>
            </details>
        </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap" style="display:none">
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import init, { GnvPlayer } from '../../pkg/gnc.js';

        const $ = id => document.getElementById(id);
        const dropZone = $('dropZone');
        const fileInput = $('fileInput');
        const status = $('status');
        let canvas = $('canvas');
        const playBtn = $('playBtn');
        const stopBtn = $('stopBtn');
        const prevBtn = $('prevBtn');
        const nextBtn = $('nextBtn');
        const seekBar = $('seekBar');
        const frameLabel = $('frameLabel');
        const canvasWrap = $('canvasWrap');
        const rightPanel = $('rightPanel');
        const demoSelect = $('demoSelect');
        const loadDemoBtn = $('loadDemoBtn');
        const demoDesc = $('demoDesc');
        const demoDlLink = $('demoDlLink');
        const demoDiagLink = $('demoDiagLink');

        const diagPanel = $('diagPanel');
        const diagContent = $('diagContent');

        let ctx2d = null;

        let wasmReady = false;
        let diagData = null;
        let player = null;
        let playing = false;
        let zeroCopy = false;
        let animId = null;
        let playbackStartTime = 0;
        let playbackStartFrame = 0;
        let framesSinceLastStat = 0;
        let statSeekAccum = 0;
        let statDecodeAccum = 0;
        let cachedWidth = 0;
        let cachedHeight = 0;
        let cachedFc = 0;
        let cachedFps = 0;

        // --- Status helpers ---
        function setStatus(msg, type = 'info') {
            status.textContent = msg;
            status.className = `status-${type}`;
        }

        // --- Timing log ---
        let timingLog = []; // { frame, seek, decode, total, fps }

        function fmtMs(v) { return v < 10 ? v.toFixed(2) : v.toFixed(1); }

        function logTiming(frame, seekMs, decodeMs) {
            const total = seekMs + decodeMs;
            const fps = total > 0 ? 1000 / total : 0;
            timingLog.push({ frame, seek: seekMs, decode: decodeMs, total, fps });
            // Append row to table
            const body = $('logBody');
            const tr = document.createElement('tr');
            tr.innerHTML =
                `<td>${frame}</td>` +
                `<td class="col-seek">${fmtMs(seekMs)}</td>` +
                `<td class="col-decode">${fmtMs(decodeMs)}</td>` +
                `<td class="col-total">${fmtMs(total)}</td>` +
                `<td class="col-fps">${fps.toFixed(1)}</td>`;
            body.appendChild(tr);
            // Auto-scroll to bottom
            const wrap = $('logWrap');
            wrap.scrollTop = wrap.scrollHeight;
            // Update count + summary
            updateLogSummary();
        }

        function updateLogSummary() {
            const n = timingLog.length;
            $('logCount').textContent = `(${n} frame${n !== 1 ? 's' : ''})`;
            if (n === 0) { $('logSummary').textContent = ''; return; }
            const seeks = timingLog.map(e => e.seek);
            const decs = timingLog.map(e => e.decode);
            const tots = timingLog.map(e => e.total);
            const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
            const max = arr => Math.max(...arr);
            const min = arr => Math.min(...arr);
            const avgTotal = avg(tots);
            const avgFps = avgTotal > 0 ? (1000 / avgTotal).toFixed(1) : '--';
            $('logSummary').textContent =
                `Avg: ${fmtMs(avgTotal)} ms (seek ${fmtMs(avg(seeks))} + dec ${fmtMs(avg(decs))}) ${avgFps} fps` +
                ` | Min: ${fmtMs(min(tots))} | Max: ${fmtMs(max(tots))}`;
        }

        function clearTimingLog() {
            timingLog = [];
            $('logBody').innerHTML = '';
            updateLogSummary();
        }

        function copyTimingCsv() {
            if (timingLog.length === 0) return;
            const lines = ['frame,seek_ms,decode_ms,total_ms,fps'];
            for (const e of timingLog) {
                lines.push(`${e.frame},${e.seek.toFixed(2)},${e.decode.toFixed(2)},${e.total.toFixed(2)},${e.fps.toFixed(2)}`);
            }
            navigator.clipboard.writeText(lines.join('\n')).then(() => {
                setStatus(`Copied ${timingLog.length} rows to clipboard`, 'ok');
            });
        }

        $('logClearBtn').addEventListener('click', clearTimingLog);
        $('logCopyBtn').addEventListener('click', copyTimingCsv);

        // --- Timing display ---
        function showTiming(seekMs, decodeMs) {
            const total = seekMs + decodeMs;
            $('timSeek').textContent = `Seek: ${fmtMs(seekMs)} ms`;
            $('timDecode').textContent = `Decode: ${fmtMs(decodeMs)} ms`;
            $('timTotal').textContent = `Total: ${fmtMs(total)} ms`;
        }
        function showTimingAvg(avgSeek, avgDecode) {
            const total = avgSeek + avgDecode;
            $('timSeek').textContent = `Seek: ${fmtMs(avgSeek)} ms`;
            $('timDecode').textContent = `Decode: ${fmtMs(avgDecode)} ms`;
            $('timTotal').textContent = `Total: ${fmtMs(total)} ms`;
            $('timPlayFps').textContent = `Play: ${(1000 / total).toFixed(1)} fps`;
        }
        function resetTiming() {
            $('timSeek').textContent = 'Seek: --';
            $('timDecode').textContent = 'Decode: --';
            $('timTotal').textContent = 'Total: --';
            $('timPlayFps').textContent = '';
        }

        // --- Diagnostics ---
        function parseDiag(text) {
            const frames = new Map();
            // GNV2 temporal wavelet: GOP-based diag
            if (/^GOP \d+/m.test(text)) {
                const gops = text.split(/\n(?=GOP \d+)/);
                for (const block of gops) {
                    const m = block.match(/^GOP (\d+) \[(\d+) frames\]/);
                    if (!m) continue;
                    const gopIdx = parseInt(m[1], 10);
                    const gopSize = parseInt(m[2], 10);
                    const base = gopIdx * gopSize;
                    // Map every frame in this GOP to the full GOP diag block
                    for (let i = 0; i < gopSize; i++) {
                        frames.set(base + i, block.trim());
                    }
                }
            } else {
                // GNV1: per-frame diag
                const blocks = text.split(/\n(?=Frame \d+)/);
                for (const block of blocks) {
                    const m = block.match(/^Frame (\d+)/);
                    if (!m) continue;
                    frames.set(parseInt(m[1], 10), block.trim());
                }
            }
            return frames;
        }

        function showDiag(frameIdx) {
            if (!diagData || diagData.size === 0) {
                diagPanel.style.display = 'none';
                return;
            }
            diagPanel.style.display = '';
            const raw = diagData.get(frameIdx);
            if (!raw) {
                diagContent.innerHTML = `<span style="color:#666">No diagnostics for frame ${frameIdx}</span>`;
                return;
            }
            const escaped = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
            const html = escaped
                .replace(/^(Frame \d+ \[I\].*)$/m, '<span class="diag-type-I">$1</span>')
                .replace(/^(Frame \d+ \[P\].*)$/m, '<span class="diag-type-P">$1</span>')
                .replace(/^(Frame \d+ \[B\].*)$/m, '<span class="diag-type-B">$1</span>')
                .replace(/^(Frame \d+ \[L\].*)$/gm, '<span class="diag-type-I">$1</span>')
                .replace(/^(Frame \d+ \[H\d+\].*)$/gm, '<span class="diag-type-P">$1</span>')
                .replace(/^(GOP \d+.*)$/m, '<b>$1</b>')
                .replace(/^(  WARN:.*)$/gm, '<span class="diag-warn">$1</span>');
            diagContent.innerHTML = html;
        }

        async function fetchDiag(gnvName) {
            diagData = null;
            const diagFullLink = $('diagFullLink');
            diagFullLink.style.display = 'none';
            const diagName = gnvName.replace(/\.gnv2?$/, '.diag');
            try {
                const resp = await fetch(diagName);
                if (!resp.ok) return;
                const text = await resp.text();
                diagData = parseDiag(text);
                diagFullLink.href = diagName;
                diagFullLink.style.display = '';
            } catch (_) {
                // No diagnostics available
            }
        }

        // --- Drop zone ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

        // --- Init WASM ---
        async function boot() {
            if (!navigator.gpu) {
                setStatus('WebGPU is not supported in this browser. Try Chrome 113+ or Edge 113+.', 'error');
                return;
            }
            try {
                setStatus('Initializing WebGPU + WASM...');
                await init();
                wasmReady = true;
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    const info = adapter.info || await adapter.requestAdapterInfo?.() || {};
                    console.log('WebGPU adapter:', info.device || info.description || 'unknown', '| vendor:', info.vendor, '| arch:', info.architecture);
                }
                setStatus('Ready', 'ok');
            } catch (e) {
                const msg = String(e.message || e);
                if (msg.includes('No suitable GPU adapter') || msg.includes('blocklisted')) {
                    setStatus('WebGPU: no adapter available. All GPUs may be blocklisted. Try chrome://flags/#enable-unsafe-webgpu', 'error');
                } else {
                    setStatus('Init failed: ' + msg, 'error');
                }
                console.error(e);
            }
        }

        // --- Demo files ---
        const demoFiles = [
            // GNV1 files
            { name: 'test_quick.gnv', label: 'BBB Quick', desc: '10f 30fps 1080p q=75 ki=4', group: 'GNV1' },
            { name: 'test_animation.gnv', label: 'BBB Short', desc: '30f 30fps 1080p q=75 ki=8', group: 'GNV1' },
            { name: 'test_nature.gnv', label: 'Park Joy', desc: '30f 50fps 1080p q=75 ki=8', group: 'GNV1' },
            { name: 'test_crowd.gnv', label: 'Crowd Run', desc: '30f 50fps 1080p q=75 ki=8', group: 'GNV1' },
            { name: 'rush_hour.gnv', label: 'Rush Hour', desc: '200f 25fps 1080p q=75 ki=8 -- city traffic', group: 'GNV1' },
            { name: 'old_town_cross.gnv', label: 'Old Town Cross', desc: '200f 50fps 1080p q=75 ki=8 -- urban pedestrians', group: 'GNV1' },
            { name: 'stockholm.gnv', label: 'Stockholm', desc: '200f 60fps 720p q=75 ki=8 -- cityscape pan', group: 'GNV1' },
            { name: 'pedestrian_area.gnv', label: 'Pedestrian Area', desc: '200f 25fps 1080p q=75 ki=8 -- walking crowd', group: 'GNV1' },
            { name: 'ducks_q25.gnv', label: 'Ducks q25', desc: '300f 50fps 1080p q=25 ki=8', group: 'GNV1' },
            { name: 'ducks_q50.gnv', label: 'Ducks q50', desc: '300f 50fps 1080p q=50 ki=8', group: 'GNV1' },
            { name: 'ducks_q75.gnv', label: 'Ducks q75', desc: '300f 50fps 1080p q=75 ki=8', group: 'GNV1' },
            { name: 'bbb_2min_q5.gnv', label: 'BBB 2min q5', desc: '1800f 30fps 1080p q=5 ki=24', group: 'GNV1' },
            { name: 'bbb_2min.gnv', label: 'BBB 2min q75', desc: '1800f 30fps 1080p q=75 ki=24', group: 'GNV1' },
            // GNV2 temporal wavelet files
            { name: 'tw_test_quick.gnv2', label: 'BBB Quick', desc: '8f 30fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_test_animation.gnv2', label: 'BBB Short', desc: '24f 30fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_test_nature.gnv2', label: 'Park Joy', desc: '32f 50fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_test_crowd.gnv2', label: 'Crowd Run', desc: '32f 50fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_rush_hour.gnv2', label: 'Rush Hour', desc: '200f 25fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_old_town_cross.gnv2', label: 'Old Town', desc: '200f 50fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_stockholm.gnv2', label: 'Stockholm', desc: '200f 60fps 720p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_pedestrian_area.gnv2', label: 'Ped. Area', desc: '200f 25fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_ducks_q25.gnv2', label: 'Ducks q25', desc: '300f 50fps 1080p q=25 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_ducks_q50.gnv2', label: 'Ducks q50', desc: '300f 50fps 1080p q=50 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_ducks_q75.gnv2', label: 'Ducks q75', desc: '300f 50fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_bbb_2min_q5.gnv2', label: 'BBB 2min q5', desc: '1800f 30fps 1080p q=5 Haar', group: 'GNV2 (Temporal Wavelet)' },
            { name: 'tw_bbb_2min.gnv2', label: 'BBB 2min q75', desc: '1800f 30fps 1080p q=75 Haar', group: 'GNV2 (Temporal Wavelet)' },
            // Chroma subsampling comparison (single-frame, 1080p)
            { name: 'chroma_bbb_444.gnv', label: 'BBB 4:4:4 q75', desc: '1f 1080p q=75 — full chroma (3.83 bpp)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_bbb_422.gnv', label: 'BBB 4:2:2 q75', desc: '1f 1080p q=75 — halved horiz chroma (3.36 bpp, −12%)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_bbb_420.gnv', label: 'BBB 4:2:0 q75', desc: '1f 1080p q=75 — quarter chroma (2.90 bpp, −24%)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_bbb_q50_444.gnv', label: 'BBB 4:4:4 q50', desc: '1f 1080p q=50 — full chroma (2.22 bpp)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_bbb_q50_422.gnv', label: 'BBB 4:2:2 q50', desc: '1f 1080p q=50 — halved horiz chroma (1.97 bpp, −11%)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_bbb_q50_420.gnv', label: 'BBB 4:2:0 q50', desc: '1f 1080p q=50 — quarter chroma (1.70 bpp, −23%)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_sky_444.gnv', label: 'BlueSky 4:4:4 q75', desc: '1f 1080p q=75 — full chroma (3.30 bpp)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_sky_422.gnv', label: 'BlueSky 4:2:2 q75', desc: '1f 1080p q=75 — halved horiz chroma (2.32 bpp, −30%)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            { name: 'chroma_sky_420.gnv', label: 'BlueSky 4:2:0 q75', desc: '1f 1080p q=75 — quarter chroma (1.87 bpp, −43%)', group: 'Chroma (4:4:4 vs 4:2:2 vs 4:2:0)' },
            // Chroma video sequences (8 frames, I+P, 1080p)
            { name: 'seq_bbb_444_q75.gnv', label: 'BBB 4:4:4 q75', desc: '8f 30fps 1080p q=75 — I+P, full chroma (2.32 bpp avg)', group: 'Chroma Video (I+P)' },
            { name: 'seq_bbb_422_q75.gnv', label: 'BBB 4:2:2 q75', desc: '8f 30fps 1080p q=75 — I+P, halved horiz chroma (1.87 bpp avg)', group: 'Chroma Video (I+P)' },
            { name: 'seq_bbb_420_q75.gnv', label: 'BBB 4:2:0 q75', desc: '8f 30fps 1080p q=75 — I+P, quarter chroma (1.81 bpp avg)', group: 'Chroma Video (I+P)' },
            { name: 'seq_sky_444_q75.gnv', label: 'BlueSky 4:4:4 q75', desc: '8f 30fps 1080p q=75 — I+P, full chroma (3.33 bpp avg)', group: 'Chroma Video (I+P)' },
            { name: 'seq_sky_422_q75.gnv', label: 'BlueSky 4:2:2 q75', desc: '8f 30fps 1080p q=75 — I+P, halved horiz chroma (2.40 bpp avg)', group: 'Chroma Video (I+P)' },
            { name: 'seq_sky_420_q75.gnv', label: 'BlueSky 4:2:0 q75', desc: '8f 30fps 1080p q=75 — I+P, quarter chroma (2.08 bpp avg)', group: 'Chroma Video (I+P)' },
        ];

        function formatSize(bytes) {
            if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
            if (bytes >= 1e6) return (bytes / 1e6).toFixed(0) + ' MB';
            if (bytes >= 1e3) return (bytes / 1e3).toFixed(0) + ' KB';
            return bytes + ' B';
        }

        // Build grouped <optgroup> dropdown
        const groups = {};
        for (const d of demoFiles) {
            if (!groups[d.group]) groups[d.group] = [];
            groups[d.group].push(d);
        }
        for (const [groupName, files] of Object.entries(groups)) {
            const optgroup = document.createElement('optgroup');
            optgroup.label = groupName;
            for (const f of files) {
                const opt = document.createElement('option');
                opt.value = f.name;
                opt.textContent = f.label;
                opt.dataset.desc = f.desc;
                optgroup.appendChild(opt);

                // Probe file size via HEAD
                fetch(f.name, { method: 'HEAD' }).then(r => {
                    const cl = r.headers.get('content-length');
                    if (cl && r.ok) {
                        opt.textContent = `${f.label} (${formatSize(parseInt(cl, 10))})`;
                    }
                }).catch(() => {});
            }
            demoSelect.appendChild(optgroup);
        }

        // Show description + links when selection changes
        demoSelect.addEventListener('change', () => {
            const sel = demoSelect.selectedOptions[0];
            if (!sel || !sel.value) {
                demoDesc.textContent = '';
                demoDlLink.style.display = 'none';
                demoDiagLink.style.display = 'none';
                return;
            }
            demoDesc.textContent = sel.dataset.desc || '';
            demoDlLink.href = sel.value;
            demoDlLink.download = sel.value;
            demoDlLink.style.display = '';
            const diagName = sel.value.replace(/\.gnv2?$/, '.diag');
            demoDiagLink.href = diagName;
            demoDiagLink.title = 'Open ' + diagName;
            demoDiagLink.style.display = '';
        });

        loadDemoBtn.addEventListener('click', () => {
            const val = demoSelect.value;
            if (val) loadUrl(val);
        });

        // Double-click on select to load immediately
        demoSelect.addEventListener('dblclick', () => {
            const val = demoSelect.value;
            if (val) loadUrl(val);
        });

        async function loadUrl(filename) {
            if (!wasmReady) { setStatus('WASM still loading, please wait...', 'info'); return; }
            stop();
            try {
                const url = filename;
                setStatus(`Fetching ${filename}...`);
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const total = parseInt(resp.headers.get('content-length') || '0', 10);

                const reader = resp.body.getReader();
                const chunks = [];
                let received = 0;
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    if (total > 0) {
                        const pct = (received / total * 100).toFixed(0);
                        const mb = (received / 1e6).toFixed(1);
                        setStatus(`Fetching ${filename}... ${mb} MB (${pct}%)`);
                    }
                }
                const buf = new Uint8Array(received);
                let offset = 0;
                for (const chunk of chunks) {
                    buf.set(chunk, offset);
                    offset += chunk.length;
                }

                setStatus('Creating player...');
                const diagPromise = fetchDiag(filename);
                await loadBuffer(buf, filename);
                await diagPromise;
                showDiag(0);
            } catch (e) {
                setStatus('Error: ' + (e.message || e), 'error');
                console.error(e);
            }
        }

        // --- Load file ---
        async function loadFile(file) {
            if (!wasmReady) { setStatus('WASM still loading, please wait...', 'info'); return; }
            stop();
            try {
                setStatus('Loading ' + file.name + '...');
                const buf = new Uint8Array(await file.arrayBuffer());
                setStatus('Creating player...');
                diagData = null;
                await loadBuffer(buf, file.name);
                showDiag(0);
            } catch (e) {
                setStatus('Error: ' + (e.message || e), 'error');
                console.error(e);
            }
        }

        async function loadBuffer(buf, name) {
            zeroCopy = false;

            const oldCanvas = canvas;
            const newCanvas = document.createElement('canvas');
            newCanvas.id = 'canvas';
            oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);
            canvas = newCanvas;
            ctx2d = null;

            player = await GnvPlayer.create(buf);

            const w = player.width;
            const h = player.height;
            const fc = player.frame_count;
            const fps = player.fps;
            cachedWidth = w;
            cachedHeight = h;
            cachedFc = fc;
            cachedFps = fps;

            canvas.width = w;
            canvas.height = h;
            canvasWrap.style.display = '';
            rightPanel.style.display = 'flex';

            seekBar.max = Math.max(0, fc - 1);
            seekBar.value = 0;
            updateFrameLabel(0);

            $('statRes').textContent = `${w}x${h}`;
            $('statFps').textContent = `${fps.toFixed(1)} fps`;
            $('statSize').textContent = formatSize(buf.byteLength);
            resetTiming();
            clearTimingLog();

            playBtn.disabled = false;
            stopBtn.disabled = false;
            prevBtn.disabled = fc <= 1;
            nextBtn.disabled = fc <= 1;
            playBtn.textContent = fc > 1 ? 'Play' : 'Decode';

            // Try zero-copy GPU surface rendering (works for both GNV1 and GNV2)
            try {
                player.set_canvas(canvas);
                zeroCopy = true;
                console.log('Zero-copy GPU canvas rendering enabled');
                $('statPath').textContent = 'GPU blit';
            } catch (e) {
                console.warn('Zero-copy not available, using readback path:', e);
                zeroCopy = false;
                $('statPath').textContent = 'readback';
            }

            // Decode first frame
            setStatus('Decoding frame 0...');
            if (zeroCopy) {
                player.decode_and_present();
                const sk = player.last_seek_ms, dk = player.last_decode_ms;
                showTiming(sk, dk);
                logTiming(0, sk, dk);
            } else {
                const t0 = performance.now();
                const rgba = await player.decode_next_frame();
                paintFrame(rgba, w, h);
                const dt = performance.now() - t0;
                showTiming(0, dt);
                logTiming(0, 0, dt);
            }
            seekBar.value = 0;
            updateFrameLabel(0);
            setStatus(`${name} loaded (${fc} frame${fc > 1 ? 's' : ''})`, 'ok');

            player.reset();
            jsCurrentFrame = 0;
        }

        // --- Paint (readback fallback path) ---
        function paintFrame(rgba, w, h) {
            if (!ctx2d) ctx2d = canvas.getContext('2d');
            const clamped = new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength);
            const img = new ImageData(clamped, w, h);
            ctx2d.putImageData(img, 0, 0);
        }

        // --- Playback ---
        let jsCurrentFrame = 0;

        function updateFrameLabel(idx) {
            frameLabel.textContent = `${idx} / ${cachedFc > 0 ? cachedFc - 1 : 0}`;
        }

        async function playLoop() {
            if (!playing || !player) return;

            const now = performance.now();
            const targetFrame = Math.floor((now - playbackStartTime) / 1000 * cachedFps) + playbackStartFrame;

            if (jsCurrentFrame > targetFrame) {
                animId = requestAnimationFrame(playLoop);
                return;
            }

            if (zeroCopy) {
                player.decode_and_present();
            } else {
                const rgba = await player.decode_next_frame();
                if (!playing) return;
                paintFrame(rgba, cachedWidth, cachedHeight);
            }

            const seekMs = zeroCopy ? player.last_seek_ms : 0;
            const decodeMs = zeroCopy ? player.last_decode_ms : 0;

            jsCurrentFrame++;
            if (jsCurrentFrame >= cachedFc) jsCurrentFrame = 0;

            if (!playing) return;

            const displayFrame = (jsCurrentFrame + cachedFc - 1) % cachedFc;
            seekBar.value = displayFrame;
            updateFrameLabel(displayFrame);

            // Log per-frame timing
            logTiming(displayFrame, seekMs, decodeMs);

            const behind = targetFrame - displayFrame;
            if (behind > 3) {
                playbackStartTime = performance.now();
                playbackStartFrame = jsCurrentFrame;
            }

            framesSinceLastStat++;
            statSeekAccum += seekMs;
            statDecodeAccum += decodeMs;
            if (framesSinceLastStat >= 10) {
                const avgSeek = statSeekAccum / framesSinceLastStat;
                const avgDecode = statDecodeAccum / framesSinceLastStat;
                showTimingAvg(avgSeek, avgDecode);
                framesSinceLastStat = 0;
                statSeekAccum = 0;
                statDecodeAccum = 0;
                showDiag(displayFrame);
            }

            if (jsCurrentFrame === 0) {
                player.reset();
                playbackStartTime = performance.now();
                playbackStartFrame = 0;
            }

            const nowAfter = performance.now();
            const nextTarget = Math.floor((nowAfter - playbackStartTime) / 1000 * cachedFps) + playbackStartFrame;
            if (jsCurrentFrame <= nextTarget) {
                setTimeout(playLoop, 0);
            } else {
                animId = requestAnimationFrame(playLoop);
            }
        }

        function play() {
            if (!player) return;
            playing = true;
            playBtn.textContent = 'Pause';
            playbackStartTime = performance.now();
            playbackStartFrame = jsCurrentFrame;
            framesSinceLastStat = 0;
            statSeekAccum = 0;
            statDecodeAccum = 0;
            animId = requestAnimationFrame(playLoop);
        }

        function pause() {
            playing = false;
            if (cachedFc > 1) playBtn.textContent = 'Play';
            if (animId) { cancelAnimationFrame(animId); animId = null; }
        }

        function stop() {
            pause();
            if (player) {
                player.reset();
                jsCurrentFrame = 0;
                seekBar.value = 0;
                updateFrameLabel(0);
                $('timPlayFps').textContent = '';
            }
        }

        playBtn.addEventListener('click', () => {
            if (!player) return;
            if (cachedFc === 1) {
                player.reset();
                jsCurrentFrame = 0;
                if (zeroCopy) {
                    player.decode_and_present();
                    const sk = player.last_seek_ms, dk = player.last_decode_ms;
                    showTiming(sk, dk);
                    logTiming(0, sk, dk);
                } else {
                    const t0 = performance.now();
                    player.decode_next_frame().then(rgba => {
                        paintFrame(rgba, cachedWidth, cachedHeight);
                        const dt = performance.now() - t0;
                        showTiming(0, dt);
                        logTiming(0, 0, dt);
                    });
                }
                return;
            }
            if (playing) pause(); else play();
        });

        stopBtn.addEventListener('click', () => {
            if (!player) return;
            stop();
            // Re-decode frame 0
            if (zeroCopy) {
                player.decode_and_present();
                const sk = player.last_seek_ms, dk = player.last_decode_ms;
                showTiming(sk, dk);
                logTiming(0, sk, dk);
            } else {
                player.decode_next_frame().then(rgba => {
                    paintFrame(rgba, cachedWidth, cachedHeight);
                    player.reset();
                    jsCurrentFrame = 0;
                });
            }
            showDiag(0);
            setStatus('Stopped', 'ok');
        });

        // --- Step frame ---
        async function stepFrame(delta) {
            if (!player || cachedFc <= 1) return;
            pause();
            const target = Math.max(0, Math.min(cachedFc - 1, jsCurrentFrame + delta - 1));
            seekBar.value = target;
            setStatus(`Frame ${target}`, 'ok');
            if (zeroCopy) {
                player.seek_and_present(target);
                const sk = player.last_seek_ms, dk = player.last_decode_ms;
                showTiming(sk, dk);
                logTiming(target, sk, dk);
            } else {
                const t0 = performance.now();
                const rgba = await player.seek(target);
                paintFrame(rgba, cachedWidth, cachedHeight);
                const dt = performance.now() - t0;
                showTiming(0, dt);
                logTiming(target, 0, dt);
            }
            jsCurrentFrame = target + 1;
            updateFrameLabel(target);
            showDiag(target);
        }

        prevBtn.addEventListener('click', () => stepFrame(-1));
        nextBtn.addEventListener('click', () => stepFrame(+1));

        // Arrow key stepping
        document.addEventListener('keydown', e => {
            if (!player || cachedFc <= 1) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (e.key === 'ArrowLeft')  { e.preventDefault(); stepFrame(-1); }
            if (e.key === 'ArrowRight') { e.preventDefault(); stepFrame(+1); }
        });

        // --- Seek ---
        seekBar.addEventListener('input', async () => {
            if (!player || cachedFc <= 1) return;
            pause();
            const target = parseInt(seekBar.value, 10);
            setStatus(`Seeking to frame ${target}...`);
            if (zeroCopy) {
                player.seek_and_present(target);
                const sk = player.last_seek_ms, dk = player.last_decode_ms;
                showTiming(sk, dk);
                logTiming(target, sk, dk);
            } else {
                const t0 = performance.now();
                const rgba = await player.seek(target);
                paintFrame(rgba, cachedWidth, cachedHeight);
                const dt = performance.now() - t0;
                showTiming(0, dt);
                logTiming(target, 0, dt);
            }
            jsCurrentFrame = target + 1;
            updateFrameLabel(target);
            setStatus(`Frame ${target}`, 'ok');
            showDiag(target);
        });

        boot();
    </script>
