<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GNC/GNV WebGPU Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }
        h1 { color: #fff; margin-bottom: 4px; font-size: 1.4em; }
        .subtitle { color: #888; margin-bottom: 16px; font-size: 0.9em; }

        /* --- Top section: two columns above the video --- */
        .top-section {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 16px;
            align-items: flex-start;
        }
        .top-left {
            flex: 1;
            min-width: 0;
        }
        .top-right {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        @media (max-width: 720px) {
            .top-section { flex-direction: column; }
        }

        .drop-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 12px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #6c63ff;
            background: rgba(108, 99, 255, 0.08);
        }
        .drop-zone input { display: none; }

        .canvas-wrap {
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 12px;
            line-height: 0;
            max-width: 1100px;
            width: 100%;
        }
        canvas {
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        button {
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 7px 16px;
            font-size: 0.9em;
            cursor: pointer;
            white-space: nowrap;
        }
        button:hover { background: #5a52d5; }
        button:disabled { background: #444; cursor: default; }
        input[type="range"] {
            flex: 1;
            accent-color: #6c63ff;
        }
        .frame-label {
            font-variant-numeric: tabular-nums;
            font-size: 0.82em;
            min-width: 72px;
            text-align: right;
        }

        .stats {
            font-size: 0.78em;
            color: #888;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .stats span { white-space: nowrap; }

        .diag-panel {
            margin-top: 4px;
        }
        .diag-panel summary {
            cursor: pointer;
            color: #888;
            font-size: 0.85em;
            margin-bottom: 4px;
        }
        .diag-content {
            background: #111;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
            font-size: 0.72em;
            line-height: 1.45;
            color: #bbb;
            white-space: pre;
        }
        .diag-content .diag-warn { color: #d87c7c; }
        .diag-content .diag-type-I { color: #7cd88b; }
        .diag-content .diag-type-P { color: #7cb3d8; }
        .diag-content .diag-type-B { color: #d8c87c; }

        #status {
            margin-bottom: 8px;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85em;
            text-align: center;
        }
        .status-info { background: #1e3a5f; color: #7cb3d8; }
        .status-error { background: #5f1e1e; color: #d87c7c; }
        .status-ok { background: #1e5f2e; color: #7cd88b; }

        .demos {
            margin-bottom: 8px;
        }
        .demos summary {
            cursor: pointer;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 6px;
        }
        .demo-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .demo-grid button {
            background: #2a2a4a;
            font-size: 0.78em;
            padding: 5px 12px;
        }
        .demo-grid button:hover { background: #3a3a5a; }

        .right-label {
            font-size: 0.78em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <h1>GNC/GNV WebGPU Player</h1>
    <p class="subtitle">Drag & drop or select a <code>.gnc</code> / <code>.gnv</code> / <code>.gnv2</code> file</p>

    <div class="top-section">
        <!-- Left column: file input + demos + status -->
        <div class="top-left">
            <div class="drop-zone" id="dropZone">
                <input type="file" id="fileInput" accept=".gnc,.gnv,.gnv2">
                <p>Click or drop file here</p>
            </div>

            <details class="demos" open>
                <summary>Demo files</summary>
                <div class="demo-grid" id="demoGrid"></div>
            </details>

            <div id="status" class="status-info">Ready</div>
        </div>

        <!-- Right column: controls + stats + diagnostics -->
        <div class="top-right" id="rightPanel" style="display:none">
            <div class="controls" id="controlsBar">
                <button id="playBtn" disabled>Play</button>
                <button id="stopBtn" disabled title="Stop and reset to frame 0">Stop</button>
                <input type="range" id="seekBar" min="0" max="0" value="0" step="1">
                <span class="frame-label" id="frameLabel">0 / 0</span>
            </div>

            <div class="stats" id="statsBar">
                <span id="statRes"></span>
                <span id="statFps"></span>
                <span id="statSize"></span>
                <span id="statDecode"></span>
                <span id="statPlayFps"></span>
                <span id="statPath"></span>
            </div>

            <details class="diag-panel" id="diagPanel" style="display:none">
                <summary>Frame diagnostics <a id="diagFullLink" href="#" target="_blank" style="color:#6c63ff;font-size:0.85em;margin-left:8px;text-decoration:none;display:none">open full .diag</a></summary>
                <div class="diag-content" id="diagContent">No diagnostics available</div>
            </details>
        </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap" style="display:none">
        <canvas id="canvas"></canvas>
    </div>

    <script type="module">
        import init, { GnvPlayer } from '../../pkg/gnc.js';

        const $ = id => document.getElementById(id);
        const dropZone = $('dropZone');
        const fileInput = $('fileInput');
        const status = $('status');
        let canvas = $('canvas');
        const playBtn = $('playBtn');
        const stopBtn = $('stopBtn');
        const seekBar = $('seekBar');
        const frameLabel = $('frameLabel');
        const canvasWrap = $('canvasWrap');
        const rightPanel = $('rightPanel');
        const statsBar = $('statsBar');

        const diagPanel = $('diagPanel');
        const diagContent = $('diagContent');

        let ctx2d = null;

        let wasmReady = false;
        let diagData = null;
        let player = null;
        let playing = false;
        let zeroCopy = false;
        let animId = null;
        let playbackStartTime = 0;
        let playbackStartFrame = 0;
        let framesSinceLastStat = 0;
        let statAccumMs = 0;
        let cachedWidth = 0;
        let cachedHeight = 0;
        let cachedFc = 0;
        let cachedFps = 0;

        // --- Status helpers ---
        function setStatus(msg, type = 'info') {
            status.textContent = msg;
            status.className = `status-${type}`;
        }

        // --- Diagnostics ---
        function parseDiag(text) {
            const frames = new Map();
            // GNV2 temporal wavelet: GOP-based diag
            if (/^GOP \d+/m.test(text)) {
                const gops = text.split(/\n(?=GOP \d+)/);
                for (const block of gops) {
                    const m = block.match(/^GOP (\d+) \[(\d+) frames\]/);
                    if (!m) continue;
                    const gopIdx = parseInt(m[1], 10);
                    const gopSize = parseInt(m[2], 10);
                    const base = gopIdx * gopSize;
                    // Map every frame in this GOP to the full GOP diag block
                    for (let i = 0; i < gopSize; i++) {
                        frames.set(base + i, block.trim());
                    }
                }
            } else {
                // GNV1: per-frame diag
                const blocks = text.split(/\n(?=Frame \d+)/);
                for (const block of blocks) {
                    const m = block.match(/^Frame (\d+)/);
                    if (!m) continue;
                    frames.set(parseInt(m[1], 10), block.trim());
                }
            }
            return frames;
        }

        function showDiag(frameIdx) {
            if (!diagData || diagData.size === 0) {
                diagPanel.style.display = 'none';
                return;
            }
            diagPanel.style.display = '';
            const raw = diagData.get(frameIdx);
            if (!raw) {
                diagContent.innerHTML = `<span style="color:#666">No diagnostics for frame ${frameIdx}</span>`;
                return;
            }
            const escaped = raw.replace(/&/g, '&amp;').replace(/</g, '&lt;');
            const html = escaped
                .replace(/^(Frame \d+ \[I\].*)$/m, '<span class="diag-type-I">$1</span>')
                .replace(/^(Frame \d+ \[P\].*)$/m, '<span class="diag-type-P">$1</span>')
                .replace(/^(Frame \d+ \[B\].*)$/m, '<span class="diag-type-B">$1</span>')
                .replace(/^(Frame \d+ \[L\].*)$/gm, '<span class="diag-type-I">$1</span>')
                .replace(/^(Frame \d+ \[H\d+\].*)$/gm, '<span class="diag-type-P">$1</span>')
                .replace(/^(GOP \d+.*)$/m, '<b>$1</b>')
                .replace(/^(  WARN:.*)$/gm, '<span class="diag-warn">$1</span>');
            diagContent.innerHTML = html;
        }

        async function fetchDiag(gnvName) {
            diagData = null;
            const diagFullLink = $('diagFullLink');
            diagFullLink.style.display = 'none';
            const diagName = gnvName.replace(/\.gnv2?$/, '.diag');
            try {
                const resp = await fetch(diagName);
                if (!resp.ok) return;
                const text = await resp.text();
                diagData = parseDiag(text);
                diagFullLink.href = diagName;
                diagFullLink.style.display = '';
            } catch (_) {
                // No diagnostics available
            }
        }

        // --- Drop zone ---
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

        // --- Init WASM ---
        async function boot() {
            if (!navigator.gpu) {
                setStatus('WebGPU is not supported in this browser. Try Chrome 113+ or Edge 113+.', 'error');
                return;
            }
            try {
                setStatus('Initializing WebGPU + WASM...');
                await init();
                wasmReady = true;
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    const info = adapter.info || await adapter.requestAdapterInfo?.() || {};
                    console.log('WebGPU adapter:', info.device || info.description || 'unknown', '| vendor:', info.vendor, '| arch:', info.architecture);
                }
                setStatus('Ready', 'ok');
            } catch (e) {
                const msg = String(e.message || e);
                if (msg.includes('No suitable GPU adapter') || msg.includes('blocklisted')) {
                    setStatus('WebGPU: no adapter available. All GPUs may be blocklisted. Try chrome://flags/#enable-unsafe-webgpu', 'error');
                } else {
                    setStatus('Init failed: ' + msg, 'error');
                }
                console.error(e);
            }
        }

        // --- Demo files ---
        const demoFiles = [
            { name: 'test_quick.gnv', label: 'BBB Quick (7 MB)', desc: '10f 30fps 1080p q=75 ki=4' },
            { name: 'test_animation.gnv', label: 'BBB Short (20 MB)', desc: '30f 30fps 1080p q=75 ki=8' },
            { name: 'test_nature.gnv', label: 'Park Joy (50 MB)', desc: '30f 50fps 1080p q=75 ki=8' },
            { name: 'test_crowd.gnv', label: 'Crowd Run (57 MB)', desc: '30f 50fps 1080p q=75 ki=8' },
            { name: 'rush_hour.gnv', label: 'Rush Hour', desc: '200f 25fps 1080p q=75 ki=8 — city traffic' },
            { name: 'old_town_cross.gnv', label: 'Old Town Cross', desc: '200f 50fps 1080p q=75 ki=8 — urban pedestrians' },
            { name: 'stockholm.gnv', label: 'Stockholm', desc: '200f 60fps 720p q=75 ki=8 — cityscape pan' },
            { name: 'pedestrian_area.gnv', label: 'Pedestrian Area', desc: '200f 25fps 1080p q=75 ki=8 — walking crowd' },
            { name: 'ducks_q25.gnv', label: 'Ducks q25 (190 MB)', desc: '300f 50fps 1080p q=25 ki=8' },
            { name: 'ducks_q50.gnv', label: 'Ducks q50 (418 MB)', desc: '300f 50fps 1080p q=50 ki=8' },
            { name: 'ducks_q75.gnv', label: 'Ducks q75 (698 MB)', desc: '300f 50fps 1080p q=75 ki=8' },
            { name: 'bbb_2min_q5.gnv', label: 'BBB 2min q5', desc: '1800f 30fps 1080p q=5 ki=24' },
            { name: 'bbb_2min.gnv', label: 'BBB 2min q75', desc: '1800f 30fps 1080p q=75 ki=24' },
            // Temporal wavelet (GNV2) demos — mirrors GNV1 set above
            { name: 'tw_test_quick.gnv2', label: 'TW BBB Quick', desc: '8f 30fps 1080p q=75 Haar' },
            { name: 'tw_test_animation.gnv2', label: 'TW BBB Short', desc: '24f 30fps 1080p q=75 Haar' },
            { name: 'tw_test_nature.gnv2', label: 'TW Park Joy', desc: '32f 50fps 1080p q=75 Haar' },
            { name: 'tw_test_crowd.gnv2', label: 'TW Crowd Run', desc: '32f 50fps 1080p q=75 Haar' },
            { name: 'tw_rush_hour.gnv2', label: 'TW Rush Hour', desc: '200f 25fps 1080p q=75 Haar' },
            { name: 'tw_old_town_cross.gnv2', label: 'TW Old Town', desc: '200f 50fps 1080p q=75 Haar' },
            { name: 'tw_stockholm.gnv2', label: 'TW Stockholm', desc: '200f 60fps 720p q=75 Haar' },
            { name: 'tw_pedestrian_area.gnv2', label: 'TW Ped. Area', desc: '200f 25fps 1080p q=75 Haar' },
            { name: 'tw_ducks_q25.gnv2', label: 'TW Ducks q25', desc: '300f 50fps 1080p q=25 Haar' },
            { name: 'tw_ducks_q50.gnv2', label: 'TW Ducks q50', desc: '300f 50fps 1080p q=50 Haar' },
            { name: 'tw_ducks_q75.gnv2', label: 'TW Ducks q75', desc: '300f 50fps 1080p q=75 Haar' },
            { name: 'tw_bbb_2min_q5.gnv2', label: 'TW BBB 2min q5', desc: '1800f 30fps 1080p q=5 Haar' },
            { name: 'tw_bbb_2min.gnv2', label: 'TW BBB 2min q75', desc: '1800f 30fps 1080p q=75 Haar' },
        ];
        function formatSize(bytes) {
            if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
            if (bytes >= 1e6) return (bytes / 1e6).toFixed(0) + ' MB';
            if (bytes >= 1e3) return (bytes / 1e3).toFixed(0) + ' KB';
            return bytes + ' B';
        }

        const demoGrid = $('demoGrid');
        for (const d of demoFiles) {
            const wrap = document.createElement('span');
            wrap.style.display = 'inline-flex'; wrap.style.gap = '0';

            const btn = document.createElement('button');
            btn.textContent = d.label;
            btn.title = d.desc;
            btn.style.borderRadius = '6px 0 0 6px';
            btn.addEventListener('click', () => loadUrl(d.name));

            // Probe file size via HEAD and append to button label
            fetch(d.name, { method: 'HEAD' }).then(r => {
                const cl = r.headers.get('content-length');
                if (cl && r.ok) {
                    const sz = parseInt(cl, 10);
                    btn.textContent = `${d.label} (${formatSize(sz)})`;
                }
            }).catch(() => {});

            const dl = document.createElement('a');
            dl.href = d.name;
            dl.download = d.name;
            dl.textContent = '\u2B07';
            dl.title = 'Download ' + d.name;
            dl.style.cssText = 'background:#222;color:#888;border-radius:0 0 0 0;padding:5px 7px;font-size:0.82em;text-decoration:none;display:flex;align-items:center;border-left:1px solid #333;';

            const diagLink = document.createElement('a');
            const diagName = d.name.replace(/\.gnv2?$/, '.diag');
            diagLink.href = diagName;
            diagLink.target = '_blank';
            diagLink.textContent = 'diag';
            diagLink.title = 'Open ' + diagName + ' in new tab';
            diagLink.style.cssText = 'background:#222;color:#888;border-radius:0 6px 6px 0;padding:5px 7px;font-size:0.72em;text-decoration:none;display:flex;align-items:center;border-left:1px solid #333;';

            wrap.appendChild(btn);
            wrap.appendChild(dl);
            wrap.appendChild(diagLink);
            demoGrid.appendChild(wrap);
        }

        async function loadUrl(filename) {
            if (!wasmReady) { setStatus('WASM still loading, please wait...', 'info'); return; }
            stop();
            try {
                const url = filename;
                setStatus(`Fetching ${filename}...`);
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const total = parseInt(resp.headers.get('content-length') || '0', 10);

                const reader = resp.body.getReader();
                const chunks = [];
                let received = 0;
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    received += value.length;
                    if (total > 0) {
                        const pct = (received / total * 100).toFixed(0);
                        const mb = (received / 1e6).toFixed(1);
                        setStatus(`Fetching ${filename}... ${mb} MB (${pct}%)`);
                    }
                }
                const buf = new Uint8Array(received);
                let offset = 0;
                for (const chunk of chunks) {
                    buf.set(chunk, offset);
                    offset += chunk.length;
                }

                setStatus('Creating player...');
                const diagPromise = fetchDiag(filename);
                await loadBuffer(buf, filename);
                await diagPromise;
                showDiag(0);
            } catch (e) {
                setStatus('Error: ' + (e.message || e), 'error');
                console.error(e);
            }
        }

        // --- Load file ---
        async function loadFile(file) {
            if (!wasmReady) { setStatus('WASM still loading, please wait...', 'info'); return; }
            stop();
            try {
                setStatus('Loading ' + file.name + '...');
                const buf = new Uint8Array(await file.arrayBuffer());
                setStatus('Creating player...');
                diagData = null;
                await loadBuffer(buf, file.name);
                showDiag(0);
            } catch (e) {
                setStatus('Error: ' + (e.message || e), 'error');
                console.error(e);
            }
        }

        async function loadBuffer(buf, name) {
            zeroCopy = false;

            const oldCanvas = canvas;
            const newCanvas = document.createElement('canvas');
            newCanvas.id = 'canvas';
            oldCanvas.parentNode.replaceChild(newCanvas, oldCanvas);
            canvas = newCanvas;
            ctx2d = null;

            player = await GnvPlayer.create(buf);

            const w = player.width;
            const h = player.height;
            const fc = player.frame_count;
            const fps = player.fps;
            cachedWidth = w;
            cachedHeight = h;
            cachedFc = fc;
            cachedFps = fps;

            canvas.width = w;
            canvas.height = h;
            canvasWrap.style.display = '';
            rightPanel.style.display = 'flex';

            seekBar.max = Math.max(0, fc - 1);
            seekBar.value = 0;
            updateFrameLabel(0);

            $('statRes').textContent = `${w}x${h}`;
            $('statFps').textContent = `${fps.toFixed(1)} fps`;
            $('statSize').textContent = formatSize(buf.byteLength);
            $('statDecode').textContent = '';
            $('statPlayFps').textContent = '';

            playBtn.disabled = false;
            stopBtn.disabled = false;
            playBtn.textContent = fc > 1 ? 'Play' : 'Decode';

            // Try zero-copy GPU surface rendering (works for both GNV1 and GNV2)
            try {
                player.set_canvas(canvas);
                zeroCopy = true;
                console.log('Zero-copy GPU canvas rendering enabled');
                $('statPath').textContent = 'GPU blit';
            } catch (e) {
                console.warn('Zero-copy not available, using readback path:', e);
                zeroCopy = false;
                $('statPath').textContent = 'readback';
            }

            // Decode first frame
            setStatus('Decoding frame 0...');
            const t0 = performance.now();
            if (zeroCopy) {
                player.decode_and_present();
            } else {
                const rgba = await player.decode_next_frame();
                paintFrame(rgba, w, h);
            }
            const dt = performance.now() - t0;
            seekBar.value = 0;
            updateFrameLabel(0);
            $('statDecode').textContent = `Decode: ${dt.toFixed(1)} ms`;
            setStatus(`${name} loaded (${fc} frame${fc > 1 ? 's' : ''})`, 'ok');

            player.reset();
            jsCurrentFrame = 0;
        }

        // --- Paint (readback fallback path) ---
        function paintFrame(rgba, w, h) {
            if (!ctx2d) ctx2d = canvas.getContext('2d');
            const clamped = new Uint8ClampedArray(rgba.buffer, rgba.byteOffset, rgba.byteLength);
            const img = new ImageData(clamped, w, h);
            ctx2d.putImageData(img, 0, 0);
        }

        // --- Playback ---
        let jsCurrentFrame = 0;

        function updateFrameLabel(idx) {
            frameLabel.textContent = `${idx} / ${cachedFc > 0 ? cachedFc - 1 : 0}`;
        }

        async function playLoop() {
            if (!playing || !player) return;

            const now = performance.now();
            const targetFrame = Math.floor((now - playbackStartTime) / 1000 * cachedFps) + playbackStartFrame;

            if (jsCurrentFrame > targetFrame) {
                animId = requestAnimationFrame(playLoop);
                return;
            }

            const t0 = performance.now();
            if (zeroCopy) {
                player.decode_and_present();
            } else {
                const rgba = await player.decode_next_frame();
                if (!playing) return;
                paintFrame(rgba, cachedWidth, cachedHeight);
            }
            const dt = performance.now() - t0;
            jsCurrentFrame++;
            if (jsCurrentFrame >= cachedFc) jsCurrentFrame = 0;

            if (!playing) return;

            const displayFrame = (jsCurrentFrame + cachedFc - 1) % cachedFc;
            seekBar.value = displayFrame;
            updateFrameLabel(displayFrame);

            const behind = targetFrame - displayFrame;
            if (behind > 3) {
                playbackStartTime = performance.now();
                playbackStartFrame = jsCurrentFrame;
            }

            framesSinceLastStat++;
            statAccumMs += dt;
            if (framesSinceLastStat >= 10) {
                const avg = statAccumMs / framesSinceLastStat;
                $('statDecode').textContent = `Decode: ${avg.toFixed(1)} ms`;
                $('statPlayFps').textContent = `Play: ${(1000 / avg).toFixed(1)} fps`;
                framesSinceLastStat = 0;
                statAccumMs = 0;
                showDiag(displayFrame);
            }

            if (jsCurrentFrame === 0) {
                player.reset();
                playbackStartTime = performance.now();
                playbackStartFrame = 0;
            }

            const nowAfter = performance.now();
            const nextTarget = Math.floor((nowAfter - playbackStartTime) / 1000 * cachedFps) + playbackStartFrame;
            if (jsCurrentFrame <= nextTarget) {
                setTimeout(playLoop, 0);
            } else {
                animId = requestAnimationFrame(playLoop);
            }
        }

        function play() {
            if (!player) return;
            playing = true;
            playBtn.textContent = 'Pause';
            playbackStartTime = performance.now();
            playbackStartFrame = jsCurrentFrame;
            framesSinceLastStat = 0;
            statAccumMs = 0;
            animId = requestAnimationFrame(playLoop);
        }

        function pause() {
            playing = false;
            if (cachedFc > 1) playBtn.textContent = 'Play';
            if (animId) { cancelAnimationFrame(animId); animId = null; }
        }

        function stop() {
            pause();
            if (player) {
                player.reset();
                jsCurrentFrame = 0;
                seekBar.value = 0;
                updateFrameLabel(0);
                $('statPlayFps').textContent = '';
            }
        }

        playBtn.addEventListener('click', () => {
            if (!player) return;
            if (cachedFc === 1) {
                player.reset();
                jsCurrentFrame = 0;
                if (zeroCopy) {
                    player.decode_and_present();
                } else {
                    player.decode_next_frame().then(rgba => {
                        paintFrame(rgba, cachedWidth, cachedHeight);
                    });
                }
                return;
            }
            if (playing) pause(); else play();
        });

        stopBtn.addEventListener('click', () => {
            if (!player) return;
            stop();
            // Re-decode frame 0
            if (zeroCopy) {
                player.decode_and_present();
            } else {
                player.decode_next_frame().then(rgba => {
                    paintFrame(rgba, cachedWidth, cachedHeight);
                    player.reset();
                    jsCurrentFrame = 0;
                });
            }
            showDiag(0);
            setStatus('Stopped', 'ok');
        });

        // --- Seek ---
        seekBar.addEventListener('input', async () => {
            if (!player || cachedFc <= 1) return;
            pause();
            const target = parseInt(seekBar.value, 10);
            setStatus(`Seeking to frame ${target}...`);
            const t0 = performance.now();
            if (zeroCopy) {
                player.seek_and_present(target);
            } else {
                const rgba = await player.seek(target);
                paintFrame(rgba, cachedWidth, cachedHeight);
            }
            const dt = performance.now() - t0;
            jsCurrentFrame = target + 1;
            updateFrameLabel(target);
            $('statDecode').textContent = `Seek+decode: ${dt.toFixed(1)} ms`;
            setStatus(`Frame ${target}`, 'ok');
            showDiag(target);
        });

        boot();
    </script>
</body>
</html>
